name: ScholarTrace deterministic tests

on:
  push:
    branches:
      - build-week-2026-scholartrace
    paths:
      - "scholartrace/**"
      - "schemas/scholartrace_*.schema.json"
      - "examples/scholartrace/**"
      - "tests/test_scholartrace_*.py"
      - "pyproject.toml"
      - ".github/workflows/scholartrace-tests.yml"
  pull_request:
    paths:
      - "scholartrace/**"
      - "schemas/scholartrace_*.schema.json"
      - "examples/scholartrace/**"
      - "tests/test_scholartrace_*.py"
      - "pyproject.toml"
      - ".github/workflows/scholartrace-tests.yml"

permissions:
  contents: read

jobs:
  deterministic-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install local package
        run: python -m pip install --no-deps --no-build-isolation .

      - name: Verify frozen synthetic fixtures
        run: python -m scholartrace verify-fixtures --fixture-dir examples/scholartrace

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run read-only CLI smoke test
        run: >-
          python -m scholartrace audit
          --case examples/scholartrace/education_claim_audit_case.json
          --proposal examples/scholartrace/education_claim_audit_proposal.json
